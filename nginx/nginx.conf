# ─── Krishi Raksha — Nginx reverse proxy ─────────────────────────────────────
# Single entrypoint that forwards to the Node API. Aware of:
#   - Socket.io WebSocket upgrades (Phase 12)
#   - SSE streaming on the chat endpoint (Phase 6) — buffering disabled
#   - 8 MB leaf-image uploads (Phase 4)
#
# TLS is intentionally omitted (not deploying yet). In production, add a 443
# server block with certs and redirect 80 → 443; the app sets HSTS in prod.

upstream krishi_api {
    server api:4000;
    keepalive 32;
}

# Map the Upgrade header so WebSocket connections proxy correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Leaf images are capped at 8 MB by Multer; allow a little headroom.
    client_max_body_size 10m;

    # Socket.io (WebSocket) — needs HTTP/1.1 + Upgrade headers.
    location /socket.io/ {
        proxy_pass http://krishi_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Chat is Server-Sent Events — disable proxy buffering so tokens stream live.
    location /api/v1/chat {
        proxy_pass http://krishi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Everything else — standard JSON API.
    location / {
        proxy_pass http://krishi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
